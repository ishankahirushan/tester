server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/lms_db
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  sql:
    init:
      mode: never

app:
  jwt:
    secret: AxsyntheGroupLMSSecretKey2024VeryLongAndSecureKeyForJWTSigning
    expiration-ms: 900000  # 15 minutes in milliseconds

  cors:
    allowed-origins: http://localhost:4200

  upload:
    image-base-path: uploads/images/
